<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Веб-сканер с Google Таблицами</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }
        #viewport-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            margin: 20px 0;
        }
        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        canvas {
            display: none;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover {
            background: #218838;
        }
        button.secondary {
            background: #007bff;
        }
        button.secondary:hover {
            background: #0069d9;
        }
        #status {
            margin: 10px 0;
            color: #666;
            font-style: italic;
        }
        #results {
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            border-left: 4px solid #28a745;
            display: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body>

<div class="container">
    <h2>Сканер текста и поиск</h2>
    
    <div id="viewport-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <button class="secondary" id="snap-btn">Распознать с камеры</button>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <div class="form-group">
        <input type="text" id="search-input" placeholder="Введите текст для поиска вручную...">
        <button id="search-btn">Искать</button>
    </div>

    <div id="status">Запуск камеры...</div>
    <div id="results"></div>
</div>

<script>
    // URL вашего развернутого Web App из Google Apps Script
    const WEB_APP_URL = 'УКАЖИТЕ_ЗДЕСЬ_ВАШ_URL_ПОСЛЕ_НАСТРОЙКИ';

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snapBtn = document.getElementById('snap-btn');
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const statusDiv = document.getElementById('status');
    const resultsDiv = document.getElementById('results');

    // 1. Инициализация камеры
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
            video.srcObject = stream;
            statusDiv.textContent = 'Камера готова. Наведите на текст и нажмите кнопку.';
        })
        .catch(err => {
            console.error("Ошибка камеры: ", err);
            statusDiv.textContent = 'Не удалось получить доступ к камере. Используйте ручной ввод.';
        });

    // 2. Логика сканирования и распознавания текста (OCR)
    snapBtn.addEventListener('click', async () => {
        statusDiv.textContent = 'Делаем снимок и распознаем текст... (это может занять 3-5 сек)';
        
        // Рисуем текущий кадр видео на скрытый canvas
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
            // Запускаем Tesseract (поддерживает русский и английский)
            const result = await Tesseract.recognize(canvas, 'rus+eng', {
                logger: m => { if(m.status === 'recognizing') statusDiv.textContent = `Распознавание: ${Math.round(m.progress * 100)}%`; }
            });
            
            const scannedText = result.data.text.trim();
            if (scannedText) {
                searchInput.value = scannedText; // помещаем текст в инпут для наглядности
                statusDiv.textContent = `Распознано: "${scannedText}". Ищем в таблице...`;
                searchInGoogleSheets(scannedText);
            } else {
                statusDiv.textContent = 'Текст не найден. Попробуйте еще раз или введите вручную.';
            }
        } catch (error) {
            console.error(error);
            statusDiv.textContent = 'Ошибка при распознавании текста.';
        }
    });

    // 3. Логика ручного поиска
    searchBtn.addEventListener('click', () => {
        const query = searchInput.value.trim();
        if (query) {
            statusDiv.textContent = `Ищем "${query}" в таблице...`;
            searchInGoogleSheets(query);
        } else {
            statusDiv.textContent = 'Пожалуйста, введите текст для поиска.';
        }
    });

    // 4. Отправка запроса в Google Таблицы
    async function searchInGoogleSheets(text) {
        if (WEB_APP_URL.includes('УКАЖИТЕ_ЗДЕСЬ_ВАШ_URL')) {
            statusDiv.textContent = 'Ошибка: Не настроен URL скрипта Google Таблиц.';
            return;
        }

        try {
            // Отправляем GET-запрос к Google Apps Script
            const response = await fetch(`${WEB_APP_URL}?query=${encodeURIComponent(text)}`);
            const data = await response.json();

            if (data.success && data.results.length > 0) {
                statusDiv.textContent = `Найдено совпадений: ${data.results.length}`;
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = '<h3>Результаты поиска:</h3>' + 
                    data.results.map(row => `<p><strong>Строка:</strong> ${row.join(', ')}</p>`).join('');
            } else {
                statusDiv.textContent = 'Совпадений в таблице не найдено.';
                resultsDiv.style.display = 'none';
            }
        } catch (error) {
            console.error(error);
            statusDiv.textContent = 'Ошибка сети или таблицы при поиске.';
        }
    }
</script>

</body>
</html>
