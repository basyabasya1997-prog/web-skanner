            const reader = new FileReader();

                // Берем первый лист
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                // Превращаем в массив массивов (удобно для поиска)
                tableData = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
                document.getElementById('tableStatus').innerText = `✅ Загружено строк: ${tableData.length}`;

            reader.readAsArrayBuffer(file);
        });

        // --- 2. ВКЛЮЧЕНИЕ КАМЕРЫ ---
        async function startCamera() {
            try {
                // Пытаемся включить заднюю камеру
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                scanBtn.disabled = false;
            } catch (err) {
                resultsDiv.innerHTML = `<span class="no-match">Ошибка камеры: ${err.message}</span>`;
            }
        }
        startCamera();

        // --- 3. СКАНИРОВАНИЕ И ПОИСК ---

            if (tableData.length === 0) {
                alert("Сначала загрузите таблицу!");

            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            scanBtn.disabled = true;
            resultsDiv.innerHTML = "Распознавание... ⏳ (может занять пару секунд)";

            // Получаем картинку в формате base64
            const imageData = canvas.toDataURL('image/png');

                const text = result.data.text.replace(/\D/g, '');

            }
        });

<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления веб-сканером</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 20px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .config-section {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #2c3e50;
            color: #ecf0f1;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

            border: 1px solid #ddd;

        }
        th {
            background-color: #3498db;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

<body>

<div class="container">
    <h1>Панель управления веб-сканером</h1>
    
    <div class="config-section">
        <h3>Интеграция с Google Таблицами</h3>
        <div class="form-group">
            <label for="apiKey">API Ключ Google:</label>
            <input type="text" id="apiKey" placeholder="Вставьте ваш API Ключ">
        </div>
        <div class="form-group">
            <label for="sheetUrl">Ссылка на Google Таблицу:</label>
            <input type="text" id="sheetUrl" placeholder="Вставьте полную ссылку на таблицу">
        </div>
        <button onclick="loadGoogleSheetData()">Загрузить данные таблицы</button>
    </div>

    <h3>Логи работы сканера / Статус</h3>
    <div id="output">Готов к работе. Вставьте данные выше, чтобы загрузить таблицу.</div>

    <div id="tableContainer"></div>
</div>

<script>
    // Функция автоматического извлечения ID таблицы из ссылки
    function parseGoogleSheetUrl(url) {
        let spreadsheetId = null;
        const idMatch = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        if (idMatch && idMatch[1]) {
            spreadsheetId = idMatch[1];
        }
        return { spreadsheetId };
    }

    // Функция для чтения данных из Google Таблиц
    function loadGoogleSheetData() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const sheetUrl = document.getElementById('sheetUrl').value.trim();
        const outputDiv = document.getElementById('output');
        const tableContainer = document.getElementById('tableContainer');

        if (!apiKey || !sheetUrl) {
            outputDiv.textContent = "Ошибка: Пожалуйста, заполните API Ключ и вставьте ссылку на таблицу.";
            outputDiv.style.color = "#e74c3c";
            return;
        }

        const parsed = parseGoogleSheetUrl(sheetUrl);
        
        if (!parsed.spreadsheetId) {
            outputDiv.textContent = "Ошибка: Не удалось распознать ID таблицы в ссылке. Проверьте её корректность.";
            outputDiv.style.color = "#e74c3c";
            return;
        }

        outputDiv.textContent = "Соединение с Google API и загрузка данных...";
        outputDiv.style.color = "#ecf0f1";
        tableContainer.innerHTML = "";

        // Читаем первые 100 строк по умолчанию
        const range = "A1:Z100";
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${parsed.spreadsheetId}/values/${encodeURIComponent(range)}?key=${apiKey}`;

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Ошибка запроса. Код статуса: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (!data.values || data.values.length === 0) {
                    outputDiv.textContent = "Данные не найдены на первом листе таблицы.";
                    return;
                }

                outputDiv.textContent = `Успешно загружено строк: ${data.values.length}`;
                outputDiv.style.color = "#2ecc71";

                // Рендеринг HTML таблицы
                let tableHtml = '<table>';
                data.values.forEach((row, index) => {
                    tableHtml += '<tr>';
                    row.forEach(cell => {
                        if (index === 0) {
                            tableHtml += `<th>${cell}</th>`;
                        } else {
                            tableHtml += `<td>${cell}</td>`;
                        }
                    });
                    tableHtml += '</tr>';
                });
                tableHtml += '</table>';
                
                tableContainer.innerHTML = tableHtml;
            })
            .catch(error => {
                outputDiv.textContent = `Ошибка при чтении таблицы: \n${error.message}\n\nПроверьте: \n1. Правильность API-ключа.\n2. Открыт ли доступ к таблице ("Все, у кого есть ссылка" в режиме Читатель).`;
                outputDiv.style.color = "#e74c3c";
                console.error(error);
            });
    }
</script>

</body>
</html>
