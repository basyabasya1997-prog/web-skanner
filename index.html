<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Веб-сканер с Google Таблицами</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        #interactive.viewport {
            position: relative;
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            margin: 20px 0;
        }
        #interactive.viewport video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #output {
            margin-top: 20px;
            padding: 15px;
            background: #2c3e50;
            color: #ecf0f1;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }
        .table-manager {
            margin: 15px 0;
            text-align: left;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
        }
        .table-manager input {
            width: 80%;
            padding: 8px;
            margin-right: 5px;
        }
        .table-list {
            list-style: none;
            padding: 0;
        }
        .table-list li {
            background: #e9ecef;
            margin: 4px 0;
            padding: 6px 10px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-all;
        }
        .table-list li button {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .camera-select {
            margin: 10px 0;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Сканер + Google Таблицы</h1>

    <!-- Управление таблицами -->
    <div class="table-manager">
        <h4>📋 Google Таблицы (CSV)</h4>
        <input type="text" id="tableUrlInput" placeholder="Вставьте URL опубликованной CSV-таблицы">
        <button id="addTableBtn">➕ Добавить</button>
        <ul id="tableList" class="table-list"></ul>
        <small>Данные загружаются автоматически при добавлении и хранятся локально.</small>
    </div>

    <!-- Выбор камеры -->
    <div class="camera-select">
        <button id="toggleCamera">📷 Переключить камеру</button>
    </div>

    <!-- Сканер -->
    <button id="startScannerBtn">▶️ Включить сканер</button>
    <div id="interactive" class="viewport"></div>

    <h3>Результат:</h3>
    <div id="output">Ожидание сканирования...</div>
</div>

<script>
    // Состояния
    let quaggaInitialized = false;
    let currentFacingMode = "environment"; // задняя по умолчанию
    let tables = []; // массив URL таблиц
    let tableData = {}; // объект: ключ – штрихкод, значение – массив ячеек строки

    // DOM элементы
    const outputDiv = document.getElementById('output');
    const tableUrlInput = document.getElementById('tableUrlInput');
    const addTableBtn = document.getElementById('addTableBtn');
    const tableListEl = document.getElementById('tableList');
    const toggleCameraBtn = document.getElementById('toggleCamera');
    const startScannerBtn = document.getElementById('startScannerBtn');

    // Загружаем сохранённые таблицы из localStorage
    function loadTablesFromStorage() {
        const stored = localStorage.getItem('webScannerTables');
        if (stored) {
            tables = JSON.parse(stored);
        }
        renderTableList();
        reloadAllTablesData(); // перезагрузить данные из всех таблиц
    }

    // Сохраняем список таблиц
    function saveTablesToStorage() {
        localStorage.setItem('webScannerTables', JSON.stringify(tables));
    }

    // Отображение списка таблиц
    function renderTableList() {
        tableListEl.innerHTML = '';
        tables.forEach((url, index) => {
            const li = document.createElement('li');
            li.textContent = url;
            const removeBtn = document.createElement('button');
            removeBtn.textContent = '❌';
            removeBtn.onclick = () => {
                tables.splice(index, 1);
                saveTablesToStorage();
                renderTableList();
                reloadAllTablesData();
            };
            li.appendChild(removeBtn);
            tableListEl.appendChild(li);
        });
    }

    // Загрузка CSV из URL и парсинг
    async function fetchTableCSV(url) {
        const response = await fetch(url);
        const text = await response.text();
        const rows = text.trim().split('\n');
        const data = {};
        rows.forEach(row => {
            // Простой парсинг CSV (без экранирования кавычек – для простых данных)
            const cols = row.split(',').map(cell => cell.trim());
            if (cols.length > 0) {
                const barcode = cols[0]; // первый столбец – штрихкод
                data[barcode] = cols;    // сохраняем всю строку
            }
        });
        return data;
    }

    // Объединяем данные из всех таблиц (приоритет последней добавленной)
    async function reloadAllTablesData() {
        tableData = {};
        for (const url of tables) {
            try {
                const newData = await fetchTableCSV(url);
                Object.assign(tableData, newData); // перезаписываем дубликаты последними
            } catch (error) {
                console.error('Ошибка загрузки таблицы:', url, error);
            }
        }
        outputDiv.textContent = `Загружено таблиц: ${tables.length}. Штрихкодов в базе: ${Object.keys(tableData).length}`;
    }

    // Добавление новой таблицы
    addTableBtn.addEventListener('click', () => {
        const url = tableUrlInput.value.trim();
        if (!url) return;
        if (!tables.includes(url)) {
            tables.push(url);
            saveTablesToStorage();
            renderTableList();
            reloadAllTablesData();
        }
        tableUrlInput.value = '';
    });

    // Остановка Quagga, если запущен
    function stopQuagga() {
        if (quaggaInitialized) {
            Quagga.stop();
            quaggaInitialized = false;
        }
    }

    // Запуск/перезапуск сканера с заданной камерой
    function startScanner() {
        stopQuagga();
        outputDiv.textContent = "Инициализация камеры...";

        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: {
                    width: 640,
                    height: 480,
                    facingMode: currentFacingMode
                }
            },
            decoder: {
                readers: ["ean_reader", "ean_8_reader", "code_128_reader"]
            }
        }, function (err) {
            if (err) {
                console.error(err);
                outputDiv.textContent = "Ошибка запуска: " + err.message;
                return;
            }
            quaggaInitialized = true;
            Quagga.start();
            outputDiv.textContent = "Сканер запущен. Наведите на штрихкод.";
        });

        // Обработка распознавания
        Quagga.onDetected(function (data) {
            const code = data.codeResult.code;
            outputDiv.textContent = `Распознан код: ${code}`;

            // Поиск в загруженных данных таблиц
            if (tableData[code]) {
                const row = tableData[code];
                // выводим всю строку, кроме первого столбца (штрихкода)
                const info = row.slice(1).join(', ');
                outputDiv.textContent = `✅ Найдено: ${info}`;
                // Можно добавить звуковой сигнал или вибрацию
            } else {
                outputDiv.textContent = `❌ Штрихкод "${code}" не найден в загруженных таблицах.`;
            }
        });
    }

    // Переключение камеры
    toggleCameraBtn.addEventListener('click', () => {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        if (quaggaInitialized) {
            startScanner(); // перезапуск с новой камерой
        }
    });

    // Кнопка запуска
    startScannerBtn.addEventListener('click', startScanner);

    // Инициализация при загрузке страницы
    loadTablesFromStorage();
</script>
</body>
</html>
